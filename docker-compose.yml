version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag_api_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
    env_file:
      - .env.example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag_streamlit_ui
    ports:
      - "7860:7860"
    environment:
      - API_PORT=8000
      - API_ADDRESS=api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
